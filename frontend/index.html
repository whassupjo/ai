<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise RAG Knowledge Agent</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --panel: #ffffff;
        --panel-soft: #f1f5f9;
        --text: #111827;
        --muted: #64748b;
        --line: #dbe2ea;
        --brand: #2563eb;
        --brand-dark: #1d4ed8;
        --user: #e8f0ff;
        --assistant: #ffffff;
        --danger: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 300px 1fr;
      }

      .sidebar {
        background: var(--panel);
        border-right: 1px solid var(--line);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .brand h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.25;
      }

      .brand span,
      .hint,
      .status,
      .source-text {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      label {
        font-size: 14px;
        font-weight: 700;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input[type="file"],
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 10px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        background: var(--brand);
        color: #fff;
        cursor: pointer;
        font-weight: 700;
      }

      button:hover {
        background: var(--brand-dark);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .ghost {
        background: var(--panel-soft);
        color: var(--text);
      }

      .ghost:hover {
        background: #e2e8f0;
      }

      .main {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-width: 0;
        height: 100vh;
      }

      .topbar {
        background: rgba(246, 247, 249, 0.92);
        border-bottom: 1px solid var(--line);
        padding: 14px 22px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
      }

      .topbar-title {
        font-weight: 700;
      }

      .messages {
        overflow-y: auto;
        padding: 24px;
      }

      .message {
        max-width: 860px;
        margin: 0 auto 18px;
        display: grid;
        gap: 8px;
      }

      .bubble {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px 16px;
        line-height: 1.75;
        white-space: pre-wrap;
      }

      .message.user {
        justify-items: end;
      }

      .message.user .bubble {
        background: var(--user);
        max-width: 70%;
      }

      .message.assistant .bubble {
        background: var(--assistant);
      }

      .message.system .bubble {
        background: var(--panel-soft);
        color: var(--muted);
      }

      .sources {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .source {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
        padding: 8px 10px;
        max-width: 260px;
      }

      .source strong {
        display: block;
        font-size: 13px;
        margin-bottom: 2px;
      }

      .composer {
        border-top: 1px solid var(--line);
        background: var(--bg);
        padding: 16px 24px 22px;
      }

      .composer-inner {
        max-width: 860px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
      }

      textarea {
        min-height: 54px;
        max-height: 180px;
        resize: vertical;
        line-height: 1.55;
      }

      .empty {
        max-width: 720px;
        margin: 12vh auto 0;
        text-align: center;
        color: var(--muted);
      }

      .empty h2 {
        margin: 0 0 8px;
        color: var(--text);
      }

      .error {
        color: var(--danger);
      }

      @media (max-width: 820px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .main {
          height: auto;
          min-height: 70vh;
        }

        .message.user .bubble {
          max-width: 100%;
        }

        .composer-inner {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <h1>Enterprise RAG Knowledge Agent</h1>
          <span>企业知识库问答助手</span>
        </div>

        <div class="field">
          <label for="file">上传知识文档</label>
          <input id="file" type="file" accept=".pdf,.docx,.txt,.md" />
        </div>

        <div class="field">
          <label for="accessRole">文档访问权限</label>
          <select id="accessRole">
            <option value="guest">访客</option>
            <option value="employee" selected>员工</option>
            <option value="admin">管理员</option>
          </select>
          <button id="upload">上传到知识库</button>
        </div>

        <div class="field">
          <label for="role">当前问答角色</label>
          <select id="role">
            <option value="guest">访客</option>
            <option value="employee" selected>员工</option>
            <option value="admin">管理员</option>
          </select>
        </div>

        <button class="ghost" id="clear">清空当前对话</button>
        <button class="ghost" id="clearKb">清空知识库</button>
        <div class="status" id="status">先上传文档，再输入问题开始问答。</div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <div class="topbar-title">知识库对话</div>
            <div class="hint">回答会优先基于已上传文档，并显示召回来源。</div>
          </div>
        </header>

        <section class="messages" id="messages">
          <div class="empty" id="empty">
            <h2>开始一次知识库问答</h2>
            <div>例如：报销流程是什么？</div>
          </div>
        </section>

        <footer class="composer">
          <div class="composer-inner">
            <textarea id="question" placeholder="输入问题，按 Ctrl + Enter 发送"></textarea>
            <button id="ask">发送</button>
          </div>
        </footer>
      </main>
    </div>

    <script>
      const API_BASE = window.location.origin;
      const messages = document.getElementById("messages");
      const empty = document.getElementById("empty");
      const statusEl = document.getElementById("status");
      const askBtn = document.getElementById("ask");
      const uploadBtn = document.getElementById("upload");
      const questionEl = document.getElementById("question");

      function setStatus(text, isError = false) {
        statusEl.textContent = text;
        statusEl.className = isError ? "status error" : "status";
      }

      function hideEmpty() {
        empty.style.display = "none";
      }

      function addMessage(role, text = "") {
        hideEmpty();
        const wrapper = document.createElement("div");
        wrapper.className = `message ${role}`;
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;
        wrapper.appendChild(bubble);
        messages.appendChild(wrapper);
        messages.scrollTop = messages.scrollHeight;
        return { wrapper, bubble };
      }

      function renderSources(wrapper, sources) {
        if (!sources || sources.length === 0) {
          return;
        }
        const box = document.createElement("div");
        box.className = "sources";
        sources.forEach((source) => {
          const item = document.createElement("div");
          item.className = "source";
          const title = document.createElement("strong");
          title.textContent = `${source.filename} #${source.chunk_index} · ${source.score}`;
          const preview = document.createElement("div");
          preview.className = "source-text";
          preview.textContent = source.preview;
          item.appendChild(title);
          item.appendChild(preview);
          box.appendChild(item);
        });
        wrapper.appendChild(box);
      }

      async function uploadDocument() {
        const file = document.getElementById("file").files[0];
        const accessRole = document.getElementById("accessRole").value;
        if (!file) {
          setStatus("请选择一个知识文档。", true);
          return;
        }
        const form = new FormData();
        form.append("file", file);
        form.append("access_role", accessRole);
        uploadBtn.disabled = true;
        setStatus("正在上传并切片入库...");
        try {
          const response = await fetch(`${API_BASE}/documents/upload`, {
            method: "POST",
            body: form,
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || "上传失败");
          }
          setStatus(`已上传：${data.filename}，切片 ${data.chunks} 个。`);
          addMessage("system", `已上传知识文档：${data.filename}`);
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          uploadBtn.disabled = false;
        }
      }

      async function askQuestion() {
        const question = questionEl.value.trim();
        const role = document.getElementById("role").value;
        if (!question) {
          setStatus("请输入问题。", true);
          return;
        }

        addMessage("user", question);
        questionEl.value = "";
        const assistantMessage = addMessage("assistant", "");
        askBtn.disabled = true;
        setStatus("正在检索知识库并生成回答...");

        try {
          const response = await fetch(`${API_BASE}/chat/stream`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question, role, top_k: 4 }),
          });

          if (!response.ok || !response.body) {
            const data = await response.json().catch(() => ({}));
            throw new Error(data.detail || "请求失败");
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder("utf-8");
          let buffer = "";
          let currentEvent = "message";

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const parts = buffer.split("\n\n");
            buffer = parts.pop() || "";
            for (const part of parts) {
              const lines = part.split("\n");
              let data = "";
              lines.forEach((line) => {
                if (line.startsWith("event:")) {
                  currentEvent = line.slice(6).trim();
                }
                if (line.startsWith("data:")) {
                  data += line.slice(5).trim();
                }
              });
              if (!data) continue;
              const payload = JSON.parse(data);
              if (currentEvent === "sources") {
                renderSources(assistantMessage.wrapper, payload);
              } else if (currentEvent === "delta") {
                assistantMessage.bubble.textContent += payload;
                messages.scrollTop = messages.scrollHeight;
              } else if (currentEvent === "error") {
                assistantMessage.bubble.textContent += `\n${payload}`;
                assistantMessage.bubble.classList.add("error");
              }
            }
          }
          setStatus("回答完成。");
        } catch (error) {
          assistantMessage.bubble.textContent = error.message;
          assistantMessage.bubble.classList.add("error");
          setStatus(error.message, true);
        } finally {
          askBtn.disabled = false;
        }
      }

      uploadBtn.addEventListener("click", uploadDocument);
      askBtn.addEventListener("click", askQuestion);
      questionEl.addEventListener("keydown", (event) => {
        if (event.ctrlKey && event.key === "Enter") {
          askQuestion();
        }
      });
      document.getElementById("clear").addEventListener("click", () => {
        messages.querySelectorAll(".message").forEach((node) => node.remove());
        empty.style.display = "block";
        setStatus("已清空当前对话。知识库文档仍然保留。");
      });
      document.getElementById("clearKb").addEventListener("click", async () => {
        if (!confirm("确定清空当前知识库吗？这只会清空本项目索引，不会删除你的原始文件。")) {
          return;
        }
        try {
          const response = await fetch(`${API_BASE}/documents/`, { method: "DELETE" });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || "清空失败");
          }
          setStatus("知识库已清空，可以重新上传文档。");
          addMessage("system", "知识库已清空。");
        } catch (error) {
          setStatus(error.message, true);
        }
      });
    </script>
  </body>
</html>
